name: End-to-End DevSecOps Pipeline for Java Springboot Application


on:
  push:
    branches: [ "main" ]


jobs:

  linting:
    name: Lint, SAST and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Setup Java 17 
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Java Code Linting
        run: mvn checkstyle:check
        continue-on-error: true 

      - name: Caching Maven Dependencies Locally
        run: mvn dependency:tree -B
      

      - name: Trivy Software composition analysis
        uses: aquasecurity/trivy-action@master
        with: 
          scan-type: 'fs'        
          scan-ref: '.'
          format: 'table'
          exit-code: '0'         
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        

      - name: Maven build
        run: mvn clean package -DskipTests -Dcheckstyle.skip=true

  container_security:
    name: Container Security and  Release
    needs: linting
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:v2

      - name: Trivy Vulnerability Scan for Build Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/banking-app:v2'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Generate CycloneDX SBOM Manifest
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/banking-app:v2'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Archive SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: software-bill-of-materials
          path: sbom.json

      - name: Publish verified Image
        id: push_step
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:v2
            ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ github.sha }}

      - name: Sign the Container Image
        run: |
          cosign sign --yes "${{ secrets.DOCKERHUB_USERNAME }}/banking-app:${{ github.sha }}"





    
     
