name: End-to-End DevSecOps Pipeline for Java Springboot Application


on:
  push:
    branches: [ "main" ]


jobs:

  linting:
    name: Lint, SAST and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17 
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Java Code Linting
        run: mvn checkstyle:check
        continue-on-error: true 

      - name: Snyk setup
        uses: snyk/actions/setup@master
      

      - name: Snyk dependency scan
        run: snyk test --severity-threshold=high --all-projects -d
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Maven build
        run: mvn clean package -DskipTests



    
     
